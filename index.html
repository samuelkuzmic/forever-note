<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Note</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            font-family: monospace;
            overflow: hidden;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
            background-color: #000000;
        }
        
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #000000;
            border: 1px solid #ffffff;
            padding: 12px;
            width: 250px;
            z-index: 5;
        }
        button {
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            font-family: monospace;
            padding: 8px;
            margin-top: 8px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
            font-weight: bold;
        }
        #mode-toggle-btn.writing {
            background: #ffffff;
            color: #000000;
        }
        #system-message {
            color: #ff3333;
            margin-top: 8px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 10;
            box-sizing: border-box;
            padding: 5% 8%;
            overflow: auto; 
        }
        .overlay-content {
            max-width: 800px;
            margin: 0 auto;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .overlay-content.wide-scroll-view {
            max-width: none;
            width: max-content;
            margin: 0;
        }

        .overlay-content input, .overlay-content textarea {
            background: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            font-family: monospace;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            font-size: 1.2rem;
        }
        .overlay-content textarea {
            height: 250px;
            resize: none;
            white-space: pre;
            overflow: auto;
        }
        
        .drop-zone {
            border: 2px dashed #ffffff;
            padding: 25px;
            text-align: center;
            background: #000000;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s ease;
        }
        .drop-zone.dragover {
            background: #222222;
            border-color: #00ffcc;
        }
        .drop-zone-preview {
            max-height: 150px;
            max-width: 100%;
            display: none;
            margin: 15px auto 0 auto;
            border: 1px solid #ffffff;
        }

        .overlay-content .actions {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .overlay-content .actions button {
            font-size: 1.2rem;
            padding: 12px;
        }

        #write-error-msg {
            color: #ff3333;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            min-height: 20px;
        }

        #view-author {
            font-size: 1.4rem;
            color: #888888;
            letter-spacing: 1px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #333333;
            margin-bottom: 30px;
        }

        #view-text {
            font-size: 1.8rem;
            line-height: 2.6rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            margin-bottom: 40px;
            border-left: 2px solid #ffffff;
            padding-left: 20px;
        }

        #view-text.horizontal-layout {
            word-wrap: normal;
            white-space: pre; 
        }
        
        #view-image {
            display: none;
            max-width: 100%;
            max-height: 50vh;
            margin-bottom: 40px;
            border: 1px solid #ffffff;
            object-fit: contain;
        }

        #view-time {
            font-size: 1.3rem;
            color: #666666;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        #status-hud {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: #000000;
            border: 1px solid #ffffff;
            padding: 8px;
            text-align: right;
            line-height: 1.5em;
            font-size: 0.95rem;
        }

        .toggle-setting-container {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 15px;
        }
        .toggle-setting-container button {
            width: auto;
            margin: 0;
            padding: 6px 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>MOVE: WASD / ARROWS</div>
        <div>ZOOM: MOUSE WHEEL</div>
        <button id="mode-toggle-btn" class="writing">MODE: WRITING</button>
        <div id="system-message"></div>
    </div>

    <!-- Fullscreen Placement Screen -->
    <div id="write-panel" class="fullscreen-overlay">
        <div class="overlay-content">
            <div style="font-size: 1.2rem; margin-bottom: 20px; color:#888888;">// LEAVE YOUR MARK ON THE WORLD</div>
            <div id="write-error-msg"></div>
            
            <div class="toggle-setting-container">
                <span style="font-weight: bold;">NOTE FORMAT:</span>
                <button id="write-layout-toggle-btn">TYPE: STANDARD TEXT</button>
            </div>

            <input type="text" id="author-input" placeholder="WHO ARE YOU?" autocomplete="off">
            
            <!-- Standard/Wide Text Field -->
            <textarea id="note-input" placeholder="WRITE YOUR NOTE HERE..."></textarea>
            
            <!-- Direct Base64 String Handler Box -->
            <div id="picture-upload-container" style="display: none;">
                <div id="drop-zone" class="drop-zone">
                    <span id="drop-zone-text">DRAG & DROP A COMPRESSED IMAGE HERE OR CLICK TO BROWSE</span>
                    <input type="file" id="file-input" accept="image/*" style="display: none;">
                    <img id="drop-zone-img" class="drop-zone-preview" alt="Upload preview">
                </div>
                <input type="text" id="caption-input" placeholder="ADD AN OPTIONAL CAPTION..." autocomplete="off">
            </div>
            
            <div class="actions">
                <button id="submit-note-btn" style="background:#ffffff; color:#000000;">PUBLISH NOTE</button>
                <button onclick="closeWritePanel()">CANCEL</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Reading Screen -->
    <div id="view-panel" class="fullscreen-overlay">
        <div id="view-content-wrapper" class="overlay-content">
            <div id="view-author"></div>
            <img id="view-image" alt="Note Attachment">
            <div id="view-text"></div>
            <div id="view-time"></div>
            <div class="actions">
                <button onclick="closeViewPanel()" style="width: auto; padding: 12px 40px; background: #ffffff; color: #000000;">CLOSE NOTE</button>
            </div>
        </div>
    </div>

    <div id="status-hud">
        X: <span id="coord-x">0</span> Y: <span id="coord-y">0</span><br>
        ZOOM: <span id="zoom-val">100</span>%
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWWZLf24S0udWPPcUHf_jdVMHQi5TeH-U",
            authDomain: "note-3a92d.firebaseapp.com",
            databaseURL: "https://note-3a92d-default-rtdb.firebaseio.com",
            projectId: "note-3a92d",
            storageBucket: "note-3a92d.appspot.com",
            messagingSenderId: "281622748011",
            appId: "1:281622748011:web:8a760d6deada0af39f0a2e",
            measurementId: "G-7GVQCV766J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesCollection = collection(db, "notes");

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const camera = { x: 0, y: 0, zoom: 1.0, min: 0.05, max: 5.0, speed: 8 };
        const keys = {};
        let worldNotes = [];
        const imageCache = {};
        
        let lastMouseScreenX = window.innerWidth / 2;
        let lastMouseScreenY = window.innerHeight / 2;
        let crosshairWorldX = 0;
        let crosshairWorldY = 0;
        
        const NOTE_WIDTH = 180;
        const NOTE_HEIGHT = 115; 
        let currentMode = "WRITE"; 
        
        let noteTypeSetting = "TEXT"; 
        let base64ImageString = ""; 

        let placementTargetX = 0;
        let placementTargetY = 0;

        const authorInput = document.getElementById("author-input");
        const noteInput = document.getElementById("note-input");
        const pictureUploadContainer = document.getElementById("picture-upload-container");
        const captionInput = document.getElementById("caption-input");
        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const dropZoneImg = document.getElementById("drop-zone-img");
        const dropZoneText = document.getElementById("drop-zone-text");
        
        const sysMsg = document.getElementById("system-message");
        const writeErrorMsg = document.getElementById("write-error-msg");
        const modeToggleBtn = document.getElementById("mode-toggle-btn");
        const writeLayoutToggleBtn = document.getElementById("write-layout-toggle-btn");
        const viewText = document.getElementById("view-text");
        const viewImage = document.getElementById("view-image");
        const viewContentWrapper = document.getElementById("view-content-wrapper");
        const coordXLabel = document.getElementById("coord-x");
        const coordYLabel = document.getElementById("coord-y");
        const submitNoteBtn = document.getElementById("submit-note-btn");

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        modeToggleBtn.addEventListener('click', () => {
            if (currentMode === "WRITE") {
                currentMode = "READ";
                modeToggleBtn.innerText = "MODE: READING";
                modeToggleBtn.classList.remove('writing');
            } else {
                currentMode = "WRITE";
                modeToggleBtn.innerText = "MODE: WRITING";
                modeToggleBtn.classList.add('writing');
            }
        });

        writeLayoutToggleBtn.addEventListener('click', () => {
            if (noteTypeSetting === "TEXT") {
                noteTypeSetting = "WIDE";
                writeLayoutToggleBtn.innerText = "TYPE: WIDE (ASCII ART)";
                noteInput.style.display = "block";
                pictureUploadContainer.style.display = "none";
                noteInput.style.whiteSpace = "pre";
                noteInput.placeholder = "PASTE YOUR ASCII ARTWORK HERE...";
            } else if (noteTypeSetting === "WIDE") {
                noteTypeSetting = "PICTURE";
                writeLayoutToggleBtn.innerText = "TYPE: PICTURE MODE";
                noteInput.style.display = "none";
                pictureUploadContainer.style.display = "block";
            } else {
                noteTypeSetting = "TEXT";
                writeLayoutToggleBtn.innerText = "TYPE: STANDARD TEXT";
                noteInput.style.display = "block";
                pictureUploadContainer.style.display = "none";
                noteInput.style.whiteSpace = "pre-wrap";
                noteInput.placeholder = "WRITE YOUR NOTE HERE...";
            }
        });

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleImageSelection(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleImageSelection(e.target.files[0]);
            }
        });

        function handleImageSelection(file) {
            if (!file.type.startsWith('image/')) {
                writeErrorMsg.innerText = "Error: File must be an image.";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvasCompressor = document.createElement('canvas');
                    const ctxCompressor = canvasCompressor.getContext('2d');
                    
                    let width = img.width;
                    let height = img.height;
                    const max_size = 600; 

                    if (width > height) {
                        if (width > max_size) {
                            height *= max_size / width;
                            width = max_size;
                        }
                    } else {
                        if (height > max_size) {
                            width *= max_size / height;
                            height = max_size;
                        }
                    }

                    canvasCompressor.width = width;
                    canvasCompressor.height = height;
                    ctxCompressor.drawImage(img, 0, 0, width, height);
                    
                    base64ImageString = canvasCompressor.toDataURL('image/webp', 0.75);
                    
                    dropZoneImg.src = base64ImageString;
                    dropZoneImg.style.display = "block";
                    dropZoneText.innerText = `READY: ${file.name} (CLICK TO REPLACE)`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.addEventListener('wheel', e => {
            if (document.getElementById("view-panel").style.display === "block" || 
                document.getElementById("write-panel").style.display === "block") return;

            if (e.deltaY < 0) camera.zoom = Math.min(camera.max, camera.zoom * 1.15);
            else camera.zoom = Math.max(camera.min, camera.zoom / 1.15); 
            document.getElementById('zoom-val').innerText = Math.round(camera.zoom * 100);
            updateCoordinates();
        });

        onSnapshot(notesCollection, snapshot => {
            worldNotes = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                worldNotes.push({ id: doc.id, ...data });
                
                if (data.isPicture && data.imageUrl && !imageCache[data.imageUrl]) {
                    imageCache[data.imageUrl] = new Image();
                    imageCache[data.imageUrl].src = data.imageUrl;
                }
            });
            worldNotes.sort((a, b) => {
                const tA = a.createdAt ? a.createdAt.toMillis() : 0;
                const tB = b.createdAt ? b.createdAt.toMillis() : 0;
                return tA - tB;
            });
            sysMsg.innerText = ""; 
        }, error => {
            console.error(error);
            sysMsg.innerText = "DATABASE ERROR: CHECK RULES";
        });

        window.addEventListener('mousemove', e => {
            lastMouseScreenX = e.clientX;
            lastMouseScreenY = e.clientY;
            updateCoordinates();
        });

        function updateCoordinates() {
            const rect = canvas.getBoundingClientRect();
            const mx = lastMouseScreenX - rect.left;
            const my = lastMouseScreenY - rect.top;
            
            crosshairWorldX = (mx - canvas.width / 2) / camera.zoom + camera.x;
            crosshairWorldY = (my - canvas.height / 2) / camera.zoom + camera.y;

            coordXLabel.innerText = Math.round(crosshairWorldX);
            coordYLabel.innerText = Math.round(crosshairWorldY);
        }

        function formatNoteTime(createdAtObj) {
            if (!createdAtObj) return "JUST NOW";
            const d = createdAtObj.toDate();
            return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function checkCollision(x1, y1, w1, h1, x2, y2, w2, h2) {
            return (x1 < x2 + w2 &&
                    x1 + w1 > x2 &&
                    y1 < y2 + h2 &&
                    y1 + h1 > y2);
        }

        canvas.addEventListener('click', () => {
            updateCoordinates();

            for (let i = worldNotes.length - 1; i >= 0; i--) {
                const note = worldNotes[i];
                if (crosshairWorldX >= note.x && crosshairWorldX <= note.x + NOTE_WIDTH &&
                    crosshairWorldY >= note.y && crosshairWorldY <= note.y + NOTE_HEIGHT) {
                    
                    document.getElementById("view-author").innerText = `PUBLISHED BY: ${note.author || "Anonymous"}`;
                    viewText.innerText = note.text || "";
                    document.getElementById("view-time").innerText = `TIME CREATED: ${formatNoteTime(note.createdAt)}`;
                    
                    if (note.isPicture === true) {
                        viewImage.src = note.imageUrl || "";
                        viewImage.style.display = "block";
                        viewText.classList.remove('horizontal-layout');
                        viewContentWrapper.classList.remove('wide-scroll-view');
                    } else {
                        viewImage.style.display = "none";
                        viewImage.src = "";
                        if (note.isWide === true) {
                            viewText.classList.add('horizontal-layout');
                            viewContentWrapper.classList.add('wide-scroll-view');
                        } else {
                            viewText.classList.remove('horizontal-layout');
                            viewContentWrapper.classList.remove('wide-scroll-view');
                        }
                    }

                    const viewPanel = document.getElementById("view-panel");
                    viewPanel.scrollTop = 0;
                    viewPanel.scrollLeft = 0;
                    viewPanel.style.display = "block";
                    return; 
                }
            }

            if (currentMode === "WRITE") {
                placementTargetX = crosshairWorldX;
                placementTargetY = crosshairWorldY;

                let dynamicOverlap = false;
                for (let i = 0; i < worldNotes.length; i++) {
                    if (checkCollision(placementTargetX, placementTargetY, NOTE_WIDTH, NOTE_HEIGHT, worldNotes[i].x, worldNotes[i].y, NOTE_WIDTH, NOTE_HEIGHT)) {
                        dynamicOverlap = true;
                        break;
                    }
                }

                if (dynamicOverlap) {
                    sysMsg.innerText = "PLACEMENT OVERLAP: CHOOSE A FREE SPACE";
                    setTimeout(() => { if (sysMsg.innerText === "PLACEMENT OVERLAP: CHOOSE A FREE SPACE") sysMsg.innerText = ""; }, 2500);
                    return;
                }

                writeErrorMsg.innerText = ""; 
                document.getElementById("write-panel").style.display = "block";
                document.getElementById("write-panel").scrollTop = 0;
                
                if (noteTypeSetting === "PICTURE") {
                    captionInput.focus();
                } else {
                    noteInput.focus();
                }
            }
        });

        window.closeWritePanel = function() {
            document.getElementById("write-panel").style.display = "none";
            noteInput.value = "";
            captionInput.value = "";
            writeErrorMsg.innerText = "";
            base64ImageString = "";
            dropZoneImg.src = "";
            dropZoneImg.style.display = "none";
            dropZoneText.innerText = "DRAG & DROP A COMPRESSED IMAGE HERE OR CLICK TO BROWSE";
            
            noteTypeSetting = "TEXT";
            writeLayoutToggleBtn.innerText = "TYPE: STANDARD TEXT";
            noteInput.style.display = "block";
            pictureUploadContainer.style.display = "none";
            noteInput.style.whiteSpace = "pre-wrap";
        }

        window.closeViewPanel = function() {
            document.getElementById('view-panel').style.display='none';
        }

        submitNoteBtn.addEventListener('click', async () => {
            const author = authorInput.value.trim();
            const text = noteTypeSetting === "PICTURE" ? captionInput.value.trim() : noteInput.value.trim();

            if (!author) {
                writeErrorMsg.innerText = "Error: Please enter your identity.";
                return;
            }
            if (noteTypeSetting !== "PICTURE" && !text) {
                writeErrorMsg.innerText = "Error: Please write content inside your note card.";
                return;
            }
            if (noteTypeSetting === "PICTURE" && !base64ImageString) {
                writeErrorMsg.innerText = "Error: Please select an image file first.";
                return;
            }

            let dynamicOverlap = false;
            for (let i = 0; i < worldNotes.length; i++) {
                if (checkCollision(placementTargetX, placementTargetY, NOTE_WIDTH, NOTE_HEIGHT, worldNotes[i].x, worldNotes[i].y, NOTE_WIDTH, NOTE_HEIGHT)) {
                    dynamicOverlap = true;
                    break;
                }
            }

            if (dynamicOverlap) {
                writeErrorMsg.innerText = "Error: Blocked! Another note was placed here while you were writing.";
                return;
            }

            submitNoteBtn.disabled = true;
            submitNoteBtn.innerText = "PUBLISHING...";

            try {
                await addDoc(notesCollection, {
                    author: author,
                    text: text,
                    x: Number(placementTargetX),
                    y: Number(placementTargetY),
                    isWide: (noteTypeSetting === "WIDE"),
                    isPicture: (noteTypeSetting === "PICTURE"),
                    imageUrl: base64ImageString, 
                    createdAt: serverTimestamp()
                });

                submitNoteBtn.disabled = false;
                submitNoteBtn.innerText = "PUBLISH NOTE";
                closeWritePanel();
            } catch (err) {
                console.error(err);
                submitNoteBtn.disabled = false;
                submitNoteBtn.innerText = "PUBLISH NOTE";
                writeErrorMsg.innerText = "Error: Connection blocked. Verify Firestore Rules.";
            }
        });

        function drawCardWrappedText(context, text, x, y, maxWidth, maxHeight, startingFontSize) {
            let fontSize = startingFontSize;
            let lines = [];
            
            while (fontSize > 1) {
                context.font = `${fontSize}px monospace`;
                const words = text.replace(/\n/g, " \n ").split(' ');
                lines = [];
                let currentLine = '';

                for (let n = 0; n < words.length; n++) {
                    if (words[n] === '\n') {
                        lines.push(currentLine);
                        currentLine = '';
                        continue;
                    }
                    
                    let testLine = currentLine + words[n] + ' ';
                    let metrics = context.measureText(testLine);
                    
                    if (metrics.width > maxWidth && n > 0) {
                        lines.push(currentLine);
                        currentLine = words[n] + ' ';
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine);

                const lineHeight = fontSize * 1.15;
                const totalHeight = lines.length * lineHeight;
                
                if (totalHeight <= maxHeight) {
                    break; 
                }
                fontSize -= 0.3; 
            }

            const finalLineHeight = fontSize * 1.15;
            for (let i = 0; i < lines.length; i++) {
                context.fillText(lines[i], x, y + (i * finalLineHeight));
            }
        }

        function loop() {
            const overlaysOpen = document.getElementById("view-panel").style.display === "block" || 
                                 document.getElementById("write-panel").style.display === "block";

            if (!overlaysOpen) {
                let moved = false;
                if (keys['w'] || keys['arrowup']) { camera.y -= camera.speed / camera.zoom; moved = true; }
                if (keys['s'] || keys['arrowdown']) { camera.y += camera.speed / camera.zoom; moved = true; }
                if (keys['a'] || keys['arrowleft']) { camera.x -= camera.speed / camera.zoom; moved = true; }
                if (keys['d'] || keys['arrowright']) { camera.x += camera.speed / camera.zoom; moved = true; }

                if (moved) {
                    updateCoordinates(); 
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "#111111";
            ctx.lineWidth = 1;
            const step = 100;
            const sX = Math.floor((camera.x - canvas.width / (2 * camera.zoom)) / step) * step;
            const eX = Math.ceil((camera.x + canvas.width / (2 * camera.zoom)) / step) * step;
            const sY = Math.floor((camera.y - canvas.height / (2 * camera.zoom)) / step) * step;
            const eY = Math.ceil((camera.y + canvas.height / (2 * camera.zoom)) / step) * step;

            for (let x = sX; x <= eX; x += step) {
                ctx.beginPath();
                ctx.moveTo((x - camera.x) * camera.zoom + canvas.width / 2, 0);
                ctx.lineTo((x - camera.x) * camera.zoom + canvas.width / 2, canvas.height);
                ctx.stroke();
            }
            for (let y = sY; y <= eY; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, (y - camera.y) * camera.zoom + canvas.height / 2);
                ctx.lineTo(canvas.width, (y - camera.y) * camera.zoom + canvas.height / 2);
                ctx.stroke();
            }

            worldNotes.forEach(note => {
                const screenX = (note.x - camera.x) * camera.zoom + canvas.width / 2;
                const screenY = (note.y - camera.y) * camera.zoom + canvas.height / 2;
                const sWidth = NOTE_WIDTH * camera.zoom;
                const sHeight = NOTE_HEIGHT * camera.zoom;

                ctx.fillStyle = "#ffffff";
                ctx.fillRect(screenX, screenY, sWidth, sHeight);

                if (note.isPicture === true) {
                    ctx.strokeStyle = "#ff00ff"; 
                    ctx.lineWidth = Math.max(1.5, 2 * camera.zoom);
                    ctx.strokeRect(screenX, screenY, sWidth, sHeight);
                } else if (note.isWide === true) {
                    ctx.strokeStyle = "#00ffcc"; 
                    ctx.lineWidth = Math.max(1.5, 2 * camera.zoom);
                    ctx.strokeRect(screenX, screenY, sWidth, sHeight);
                }

                if (camera.zoom > 0.05) {
                    ctx.fillStyle = "#000000";
                    ctx.textAlign = "left";
                    
                    ctx.font = `bold ${Math.max(7, 8 * camera.zoom)}px monospace`;
                    const madeByStr = `BY: ${(note.author || "Anonymous").toUpperCase()}`;
                    const fitMadeBy = madeByStr.length > 22 ? madeByStr.substring(0, 19) + "..." : madeByStr;
                    ctx.fillText(fitMadeBy, screenX + (6 * camera.zoom), screenY + (13 * camera.zoom));

                    ctx.strokeStyle = "#dddddd";
                    ctx.lineWidth = Math.max(0.5, 1 * camera.zoom);
                    ctx.beginPath();
                    ctx.moveTo(screenX + (4 * camera.zoom), screenY + (20 * camera.zoom));
                    ctx.lineTo(screenX + sWidth - (4 * camera.zoom), screenY + (20 * camera.zoom));
                    ctx.stroke();

                    const noteContentText = note.text || "";
                    
                    if (note.isPicture === true) {
                        const cachedImg = imageCache[note.imageUrl];
                        if (cachedImg && cachedImg.complete) {
                            const pX = screenX + (6 * camera.zoom);
                            const pY = screenY + (24 * camera.zoom);
                            const pW = sWidth - (12 * camera.zoom);
                            const pH = sHeight - (44 * camera.zoom);
                            ctx.drawImage(cachedImg, pX, pY, pW, pH);
                        } else {
                            ctx.fillStyle = "#888888";
                            ctx.font = `italic ${Math.max(6.5, 7.5 * camera.zoom)}px monospace`;
                            ctx.fillText("LOADING IMAGE...", screenX + (6 * camera.zoom), screenY + (45 * camera.zoom));
                        }
                    } else if (note.isWide === true) {
                        ctx.fillStyle = "#555555";
                        ctx.font = `italic bold ${Math.max(7, 8 * camera.zoom)}px monospace`;
                        ctx.fillText("[WIDE ASCII ART NOTE]", screenX + (6 * camera.zoom), screenY + (45 * camera.zoom));
                        ctx.font = `${Math.max(6.5, 7.5 * camera.zoom)}px monospace`;
                        ctx.fillText("CLICK TO SEE ARTWORK", screenX + (6 * camera.zoom), screenY + (65 * camera.zoom));
                    } else if (noteContentText.length >= 250) {
                        // High-performance catch for standard text notes with 250+ characters
                        ctx.fillStyle = "#888888";
                        ctx.font = `italic bold ${Math.max(7, 8 * camera.zoom)}px monospace`;
                        ctx.fillText("[LONG NOTE]", screenX + (6 * camera.zoom), screenY + (45 * camera.zoom));
                        ctx.font = `${Math.max(6.5, 7.5 * camera.zoom)}px monospace`;
                        ctx.fillText("CLICK TO READ MORE", screenX + (6 * camera.zoom), screenY + (65 * camera.zoom));
                    } else {
                        ctx.fillStyle = "#000000";
                        drawCardWrappedText(
                            ctx,
                            noteContentText,
                            screenX + (6 * camera.zoom),
                            screenY + (30 * camera.zoom),
                            sWidth - (12 * camera.zoom),  
                            sHeight - (50 * camera.zoom), 
                            10.5 * camera.zoom 
                        );
                    }

                    ctx.strokeStyle = "#dddddd";
                    ctx.beginPath();
                    ctx.moveTo(screenX + (4 * camera.zoom), screenY + sHeight - (16 * camera.zoom));
                    ctx.lineTo(screenX + sWidth - (4 * camera.zoom), screenY + sHeight - (16 * camera.zoom));
                    ctx.stroke();

                    const timeStr = formatNoteTime(note.createdAt);
                    ctx.font = `${Math.max(6.5, 7.5 * camera.zoom)}px monospace`;
                    ctx.fillStyle = "#666666";
                    ctx.fillText(timeStr, screenX + (6 * camera.zoom), screenY + sHeight - (5 * camera.zoom));
                }
            });

            const crossX = (crosshairWorldX - camera.x) * camera.zoom + canvas.width / 2;
            const crossY = (crosshairWorldY - camera.y) * camera.zoom + canvas.height / 2;

            if (currentMode === "WRITE") {
                let isHoveringOverlap = false;
                for (let i = 0; i < worldNotes.length; i++) {
                    if (checkCollision(crosshairWorldX, crosshairWorldY, NOTE_WIDTH, NOTE_HEIGHT, worldNotes[i].x, worldNotes[i].y, NOTE_WIDTH, NOTE_HEIGHT)) {
                        isHoveringOverlap = true;
                        break;
                    }
                }

                ctx.strokeStyle = isHoveringOverlap ? "rgba(255, 51, 51, 0.7)" : "rgba(255, 255, 255, 0.4)";
                ctx.lineWidth = isHoveringOverlap ? 2 : 1;
                ctx.strokeRect(crossX, crossY, NOTE_WIDTH * camera.zoom, NOTE_HEIGHT * camera.zoom);
                
                ctx.fillStyle = isHoveringOverlap ? "#ff3333" : "#ffffff";
                ctx.fillRect(crossX - 3, crossY - 3, 6, 6);
            } else {
                ctx.strokeStyle = "#888888";
                ctx.beginPath();
                ctx.arc(crossX, crossY, 5, 0, Math.PI * 2);
                ctx.stroke();
            }

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
